<script>

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQN4Ns8eFCua6ysaVsl_emP9bUo-wOAwo5scj1mhNJ8Yd6fI6zBabB1b1qOooKKHi6yklBZ8YHJRjnI/pub?output=csv")

.then(response => response.text())

.then(csv => {

let rows = csv.trim().split("\n");

if(rows.length > 1){

let latest = rows[rows.length-1]
.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

document.getElementById("devotional").innerHTML = `

<p><b>Topic:</b> ${latest[0] || ""}</p>

<p><b>Scripture:</b> ${latest[1] || ""}</p>

<p>${latest[2] || ""}</p>

<p><b>Prayer:</b><br>${latest[3] || ""}</p>

<p><b>Declaration:</b><br>${latest[4] || ""}</p>

`;

}

})

.catch(error => {

document.getElementById("devotional").innerHTML =
"Unable to load Daily Blaze.";

});

</script>
