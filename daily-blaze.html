<!DOCTYPE html>
<html>
<head>
<title>Daily Blaze | Blazing Word International</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Georgia, serif;
background:#0b0b0b;
color:white;
line-height:1.9;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:#111;
padding:25px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,.5);
}

.content{
white-space:pre-wrap;
font-size:17px;
}

.post-btn{
display:inline-block;
background:#ff4500;
color:white;
padding:12px 18px;
text-decoration:none;
border-radius:6px;
margin-bottom:25px;
font-weight:bold;
}

.post-btn:hover{
background:#cc3700;
}

.archive{
margin-top:40px;
padding-top:20px;
border-top:1px solid #333;
}

.archive h2{
color:#ff4500;
margin-bottom:15px;
}

.archive a{
display:block;
color:#ffcc70;
margin-bottom:12px;
text-decoration:none;
font-weight:bold;
}

.archive a:hover{
color:#ff4500;
}
</style>
</head>

<body>

<div class="container">

<a class="post-btn"
href="https://docs.google.com/forms/d/e/1FAIpQLSdL-X0UQLLCKUxJNWJMuh2DF9Fe-h9GDSdvw25tuAcqNQGtWA/viewform"
target="_blank">
📝 Post Today's Daily Blaze
</a>

<div id="daily-blaze" class="content">
Loading...
</div>

<div class="archive">

<h2>🔥 Today's Daily Blaze</h2>
<div id="today-link"></div>

<h2>📚 Previous Devotionals</h2>
<div id="archive-list"></div>

</div>

</div>

<script>

const sheetURL =
"https://script.google.com/macros/s/AKfycbxA09f1vq26mnN-lvy8Bx4uahNTb14zpxjKAZT9H9IEgP3ecGVDSTsofA4JCZIxB1Wk/exec";

let devotionals=[];

fetch(sheetURL)
.then(res=>res.json())
.then(data=>{

devotionals=data;

showDevotional(data.length-1);

document.getElementById("today-link").innerHTML=`
<a href="#"
onclick="showDevotional(${data.length-1})">
🔥 ${data[data.length-1]["Topic:"] || "Today's Daily Blaze"}
</a>
`;

let archiveHTML="";

data.slice(0,-1).reverse().forEach((item,index)=>{

let actualIndex=data.length-2-index;

if(item["Topic:"]){

archiveHTML+=`
<a href="#"
onclick="showDevotional(${actualIndex})">
📖 ${item["Topic:"]}
</a>
`;

}

});

document.getElementById("archive-list").innerHTML=
archiveHTML;

})

.catch(err=>{

document.getElementById("daily-blaze").innerHTML=
"Unable to load Daily Blaze.";

});

function formatDate(dateString){

if(!dateString) return "";

let d=new Date(dateString);

if(isNaN(d)) return "";

return d.toLocaleDateString('en-GB',{
weekday:'long',
day:'numeric',
month:'long',
year:'numeric'
});

}

function showDevotional(index){

let item=devotionals[index];

let header=(item["Header"]||
"🔥 THE DAILY BLAZE 🔥\n\nApst. K. Atting\nBlazing Word International")
.replace("🔥 THE DAILY BLAZE 🔥Apst.","🔥 THE DAILY BLAZE 🔥\n\nApst.")
.replace("International📅","International\n\n📅");

let dateText=formatDate(item.Timestamp);

document.getElementById("daily-blaze").innerText=
`${header}
${dateText ? "\n📅 " + dateText : ""}

${item["Topic:"] || ""}

${item["Scripture:"] || ""}

${item["Message:"] || ""}

${item["Prayer:"] || ""}

${item["Declaration/Affirmation "] || ""}`;

window.scrollTo(0,0);

}

</script>

</body>
</html>
