<!DOCTYPE html>
<html>
<head>
<title>Daily Blaze | Blazing Word International</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Georgia, serif;
background:#0b0b0b;
color:white;
line-height:1.9;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:#111;
padding:25px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,.5);
}

.content{
white-space:pre-wrap;
font-size:17px;
}

.post-btn{
display:inline-block;
background:#ff4500;
color:white;
padding:12px 18px;
text-decoration:none;
border-radius:6px;
margin-bottom:25px;
font-weight:bold;
}

.archive{
margin-top:40px;
padding-top:20px;
border-top:1px solid #333;
}

.archive h2{
color:#ff4500;
margin-bottom:15px;
}

/* MONTH BUTTON */
.month{
background:#1a1a1a;
padding:12px;
margin-top:12px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
color:#ffcc70;
border:1px solid #333;
}

/* HIDDEN TOPICS */
.topics{
display:none;
padding-left:15px;
margin-top:10px;
}

/* TOPIC LINKS */
.topics a{
display:block;
color:#fff;
margin-bottom:10px;
text-decoration:none;
}

.topics a:hover{
color:#ff4500;
}

.active{
display:block;
}
</style>
</head>

<body>

<div class="container">

<a class="post-btn"
href="https://docs.google.com/forms/d/e/1FAIpQLSdL-X0UQLLCKUxJNWJMuh2DF9Fe-h9GDSdvw25tuAcqNQGtWA/viewform"
target="_blank">
📝 Post Today's Daily Blaze
</a>

<div id="daily-blaze" class="content">
Loading...
</div>

<div class="archive">

<h2>🔥 Today's Daily Blaze</h2>
<div id="today-link"></div>

<h2>📚 Previous Devotionals</h2>
<div id="archive-list"></div>

</div>

</div>

<script>

const sheetURL =
"https://script.google.com/macros/s/AKfycbxA09f1vq26mnN-lvy8Bx4uahNTb14zpxjKAZT9H9IEgP3ecGVDSTsofA4JCZIxB1Wk/exec";

let devotionals=[];

fetch(sheetURL)
.then(res=>res.json())
.then(data=>{

devotionals=data;

showDevotional(data.length-1);

/* TODAY LINK */
document.getElementById("today-link").innerHTML=`
<a href="#"
onclick="showDevotional(${data.length-1})">
🔥 ${data[data.length-1]["Topic:"] || "Today's Daily Blaze"}
</a>
`;

/* GROUP BY MONTH */
let grouped={};

data.slice(0,-1).forEach((item,index)=>{

if(!item["Topic:"]) return;

let d=item.Timestamp ? new Date(item.Timestamp) : null;

let month="MAY 2026";

if(d && !isNaN(d)){
month=d.toLocaleString('en-GB',{
month:'long',
year:'numeric'
}).toUpperCase();
}

if(!grouped[month]) grouped[month]=[];

grouped[month].push({
topic:item["Topic:"],
index:index
});

});

/* BUILD ACCORDION */
let archiveHTML="";

Object.keys(grouped).reverse().forEach((month,i)=>{

let id="m"+i;

archiveHTML+=`
<div class="month" onclick="toggleMonth('${id}')">
📅 ${month} ▼
</div>

<div id="${id}" class="topics">
`;

grouped[month].forEach(item=>{

archiveHTML+=`
<a href="#" onclick="showDevotional(${item.index})">
📖 ${item.topic}
</a>
`;

});

archiveHTML+=`
</div>
`;

});

document.getElementById("archive-list").innerHTML=
archiveHTML;

})

.catch(err=>{
document.getElementById("daily-blaze").innerHTML=
"Unable to load Daily Blaze.";
});

/* TOGGLE MONTH */
function toggleMonth(id){

let el=document.getElementById(id);

if(el.classList.contains("active")){
el.classList.remove("active");
}else{
el.classList.add("active");
}

}

function formatDate(dateString){

if(!dateString) return "";

let d=new Date(dateString);

if(isNaN(d)) return "";

return d.toLocaleDateString('en-GB',{
weekday:'long',
day:'numeric',
month:'long',
year:'numeric'
});

}

function showDevotional(index){

let item=devotionals[index];

let header=(item["Header"]||
"🔥 THE DAILY BLAZE 🔥\n\nApst. K. Atting\nBlazing Word International");

let dateText=formatDate(item.Timestamp);

document.getElementById("daily-blaze").innerText=
`${header}
${dateText ? "\n📅 " + dateText : ""}

${item["Topic:"] || ""}

${item["Scripture:"] || ""}

${item["Message:"] || ""}

${item["Prayer:"] || ""}

${item["Declaration/Affirmation "] || ""}`;

window.scrollTo(0,0);

}

</script>

</body>
</html>
