<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Blaze</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0b0b0b;
color:#fff;
}

.header{
background:linear-gradient(90deg,#ff6a00,#ff2e00);
padding:15px;
text-align:center;
font-weight:bold;
font-size:18px;
}

.container{
padding:20px;
}

.card{
background:#1a1a1a;
padding:18px;
border-radius:12px;
margin-top:15px;
box-shadow:0 0 12px rgba(255,80,0,0.25);
}

.title{
color:#ff6a00;
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

.small{
font-size:14px;
opacity:0.9;
line-height:1.6;
}

.loading{
opacity:0.7;
}
</style>
</head>

<body>

<div class="header">
Today's Daily Blaze
</div>

<div class="container">

<div id="content" class="card loading">
Loading Daily Blaze...
</div>

</div>

<script>

// ✅ GOOGLE SHEET CSV LINK (YOUR LINK)
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQN4Ns8eFCua6ysaVsl_emP9bUo-wOAwo5scj1mhNJ8Yd6fI6zBabB1b1qOooKKHi6yklBZ8YHJRjnI/pub?output=csv";

fetch(sheetURL)
.then(res => res.text())
.then(data => {

    const rows = data.trim().split("\n").filter(r => r);

    if (rows.length <= 1) {
        document.getElementById("content").innerHTML =
        "<b>No Daily Blaze posted yet.</b>";
        return;
    }

    // Get last row (latest entry)
    const lastRow = rows[rows.length - 1];

    // Safe CSV parser (fixes undefined issue)
    const cols = parseCSV(lastRow);

    const timestamp = cols[0] || "";
    const topic = cols[1] || "No Topic";
    const scripture = cols[2] || "No Scripture";
    const message = cols[3] || "No Message Available";
    const declaration = cols[4] || "No Declaration Available";

    document.getElementById("content").innerHTML = `
        <div class="title">${topic}</div>

        <p><strong>Scripture:</strong> ${scripture}</p>

        <p class="small"><em>${timestamp}</em></p>

        <br>

        <p class="small">${message}</p>

        <br>

        <p><strong>Declaration:</strong></p>
        <p class="small">${declaration}</p>
    `;

})
.catch(err => {
    console.log(err);
    document.getElementById("content").innerHTML =
    "<b>Unable to load Daily Blaze at the moment.</b>";
});


// ✅ SAFE CSV PARSER (CRITICAL FIX)
function parseCSV(row){
    let result = [];
    let current = "";
    let inQuotes = false;

    for (let i = 0; i < row.length; i++) {
        let char = row[i];

        if (char === '"') {
            inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
            result.push(current);
            current = "";
        } else {
            current += char;
        }
    }

    result.push(current);

    return result.map(v => v.replace(/"/g, "").trim());
}

</script>

</body>
</html>
