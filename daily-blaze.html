<!DOCTYPE html>
<html>
<head>
<title>The Daily Blaze | Blazing Word International</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Georgia, serif;
background:#111;
color:white;
padding:20px;
line-height:1.8;
}

.container{
max-width:900px;
margin:auto;
background:#1a1a1a;
padding:25px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,.4);
}

.devotional{
white-space:pre-line;
font-size:18px;
}

.archive{
margin-top:40px;
}

.archive h3{
color:orange;
margin-bottom:15px;
}

.archive a{
display:block;
padding:8px 0;
color:#ffcc66;
text-decoration:none;
font-weight:bold;
}

.archive a:hover{
color:orange;
}
</style>
</head>
<body>

<div class="container">

<div id="devotional" class="devotional">
Loading Daily Blaze...
</div>

<div class="archive">
<h3>📚 Previous Devotionals</h3>
<div id="archiveList"></div>
</div>

</div>

<script>

const SHEET_URL =
"https://script.google.com/macros/s/AKfycbxA09f1vq26mnN-lvy8Bx4uahNTb14zpxjKAZT9H9IEgP3ecGVDSTsofA4JCZIxB1Wk/exec";

fetch(SHEET_URL)
.then(response => response.json())
.then(data => {

data.reverse();

showDevotional(data[0]);

let archiveHTML = "";

data.forEach((item,index)=>{

archiveHTML += `
<a href="#" onclick='showDevotional(${JSON.stringify(item)})'>
📖 ${item.Topic}
</a>
`;

});

document.getElementById("archiveList").innerHTML =
archiveHTML;

})

.catch(error => {

document.getElementById("devotional").innerHTML =
"Unable to load Daily Blaze.";

});

function formatDate(date){

let d = new Date(date);

return d.toLocaleDateString(
'en-GB',
{
weekday:'long',
day:'numeric',
month:'long',
year:'numeric'
});

}

function showDevotional(item){

document.getElementById("devotional").innerHTML = `

🔥 THE DAILY BLAZE 🔥
Apst. K. Atting

📅 ${formatDate(item.Timestamp)}

📖 TOPIC:
${item.Topic || ""}

📖 Scripture:
${item.Scripture || ""}

${item.Message || ""}

🙏 Prayer:
${item.Prayer || ""}

🔥 Declaration/Affirmation:
${item["Declaration/Affirmation"] || ""}

🔥 Blazing Word International 🔥
Raising lives through the power of God's word

`;

window.scrollTo(0,0);

}

</script>

</body>
</html>
