<!DOCTYPE html>
<html>
<head>
<title>Daily Blaze | Blazing Word International</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Georgia, serif;
background:#0b0b0b;
color:white;
line-height:1.9;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:#111;
padding:25px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,.5);
}

.content{
white-space:pre-wrap;
font-size:17px;
}

.post-btn{
display:inline-block;
background:#ff4500;
color:white;
padding:12px 18px;
text-decoration:none;
border-radius:6px;
margin-bottom:25px;
font-weight:bold;
}

/* SEARCH */
.search-box{
width:100%;
padding:12px;
margin:15px 0 10px;
border-radius:6px;
border:none;
outline:none;
font-size:16px;
}

/* HISTORY */
.history{
margin-bottom:10px;
}

.history span{
display:inline-block;
background:#222;
color:#ffcc70;
padding:6px 10px;
margin:4px;
border-radius:5px;
cursor:pointer;
font-size:13px;
}

.history span:hover{
background:#333;
}

/* CLEAR BUTTON */
.clear-btn{
display:inline-block;
background:#cc0000;
color:white;
padding:6px 10px;
margin-top:8px;
border-radius:5px;
cursor:pointer;
font-size:13px;
border:none;
}

.clear-btn:hover{
background:#ff0000;
}

/* MONTH */
.month{
background:#1a1a1a;
padding:12px;
margin-top:12px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
color:#ffcc70;
border:1px solid #333;
}

.topics{
display:none;
padding-left:15px;
margin-top:10px;
}

.active{
display:block;
}

/* LINKS */
.topics a{
display:block;
color:#fff;
margin-bottom:10px;
text-decoration:none;
}

.topics a:hover{
color:#ff4500;
}

mark{
background:yellow;
color:black;
padding:2px;
}

.no-results{
color:#ff6666;
margin-top:15px;
font-weight:bold;
display:none;
}
</style>
</head>

<body>

<div class="container">

<a class="post-btn"
href="https://docs.google.com/forms/d/e/1FAIpQLSdL-X0UQLLCKUxJNWJMuh2DF9Fe-h9GDSdvw25tuAcqNQGtWA/viewform"
target="_blank">
📝 Post Today's Daily Blaze
</a>

<div id="daily-blaze" class="content">Loading...</div>

<div class="archive">

<h2>🔥 Today's Daily Blaze</h2>
<div id="today-link"></div>

<h2>📚 Previous Devotionals</h2>

<input type="text" id="searchInput" class="search-box"
placeholder="🔍 Search topic, scripture, message..."
onkeyup="searchAll()">

<!-- HISTORY -->
<div id="history" class="history"></div>

<button class="clear-btn" onclick="clearHistory()">
🗑 Clear History
</button>

<div id="archive-list"></div>

<div id="noResults" class="no-results">
🚫 No results found.
</div>

</div>

</div>

<script>

const sheetURL =
"https://script.google.com/macros/s/AKfycbxA09f1vq26mnN-lvy8Bx4uahNTb14zpxjKAZT9H9IEgP3ecGVDSTsofA4JCZIxB1Wk/exec";

let devotionals=[];
let groupedData={};

fetch(sheetURL)
.then(res=>res.json())
.then(data=>{

devotionals=data;

showDevotional(data.length-1);

document.getElementById("today-link").innerHTML=`
<a href="#"
onclick="showDevotional(${data.length-1})">
🔥 ${data[data.length-1]["Topic:"] || "Today's Daily Blaze"}
</a>
`;

groupData();
renderArchive(groupedData);
loadHistory();

})

.catch(err=>{
document.getElementById("daily-blaze").innerHTML=
"Unable to load Daily Blaze.";
});

/* GROUP */
function groupData(){

groupedData={};

devotionals.slice(0,-1).forEach((item,index)=>{

if(!item["Topic:"]) return;

let d=item.Timestamp ? new Date(item.Timestamp) : null;

let month="MAY 2026";

if(d && !isNaN(d)){
month=d.toLocaleString('en-GB',{
month:'long',
year:'numeric'
}).toUpperCase();
}

if(!groupedData[month]) groupedData[month]=[];

groupedData[month].push({
topic:item["Topic:"],
scripture:item["Scripture:"]||"",
message:item["Message:"]||"",
prayer:item["Prayer:"]||"",
decl:item["Declaration/Affirmation "]||"",
index:index
});

});

}

/* RENDER */
function renderArchive(data){

let archiveHTML="";

Object.keys(data).reverse().forEach((month,i)=>{

let id="m"+i;

archiveHTML+=`
<div class="month" onclick="toggleMonth('${id}')">
📅 ${month} ▼
</div>

<div id="${id}" class="topics">
`;

data[month].forEach(item=>{

archiveHTML+=`
<a href="#" onclick="showDevotional(${item.index})">
${item.topic}
</a>
`;

});

archiveHTML+=`</div>`;
});

document.getElementById("archive-list").innerHTML=archiveHTML;
}

/* TOGGLE */
function toggleMonth(id){
document.getElementById(id).classList.toggle("active");
}

/* SEARCH */
function searchAll(){

let input=document.getElementById("searchInput").value.trim();

if(input===""){
groupData();
renderArchive(groupedData);
document.getElementById("noResults").style.display="none";
return;
}

let filtered={};
let found=false;

devotionals.slice(0,-1).forEach((item,index)=>{

if(!item["Topic:"]) return;

let combined=
(item["Topic:"]||"")+" "+
(item["Scripture:"]||"")+" "+
(item["Message:"]||"")+" "+
(item["Prayer:"]||"");

if(combined.toLowerCase().includes(input.toLowerCase())){

found=true;

let d=item.Timestamp ? new Date(item.Timestamp) : null;

let month="MAY 2026";

if(d && !isNaN(d)){
month=d.toLocaleString('en-GB',{
month:'long',
year:'numeric'
}).toUpperCase();
}

if(!filtered[month]) filtered[month]=[];

filtered[month].push({
topic:highlight(item["Topic:"],input),
index:index
});

}

});

if(!found){
document.getElementById("archive-list").innerHTML="";
document.getElementById("noResults").style.display="block";
return;
}

document.getElementById("noResults").style.display="none";
renderArchive(filtered);
}

/* HISTORY SAVE */
function saveHistory(term){

let history=JSON.parse(localStorage.getItem("db_history")||"[]");

history=history.filter(t=>t!==term);
history.unshift(term);

if(history.length>5) history.pop();

localStorage.setItem("db_history",JSON.stringify(history));

loadHistory();
}

/* LOAD HISTORY */
function loadHistory(){

let history=JSON.parse(localStorage.getItem("db_history")||"[]");

let html="";

history.forEach(term=>{

html+=`
<span onclick="useHistory('${term}')">
${term}
</span>
`;

});

document.getElementById("history").innerHTML=html;
}

/* USE HISTORY */
function useHistory(term){

document.getElementById("searchInput").value=term;
searchAll();

}

/* CLEAR HISTORY */
function clearHistory(){

localStorage.removeItem("db_history");

loadHistory();
}

/* HIGHLIGHT */
function highlight(text,word){

if(!word) return text;

let regex=new RegExp("("+word+")","gi");

return text.replace(regex,"<mark>$1</mark>");
}

/* SHOW DEVOTIONAL */
function showDevotional(index){

let item=devotionals[index];

let header="🔥 THE DAILY BLAZE 🔥\n\nApst. K. Atting\nBlazing Word International";

let dateText=item.Timestamp ? formatDate(item.Timestamp) : "";

document.getElementById("daily-blaze").innerText=
`${header}
${dateText ? "\n📅 " + dateText : ""}

${item["Topic:"] || ""}

${item["Scripture:"] || ""}

${item["Message:"] || ""}

${item["Prayer:"] || ""}

${item["Declaration/Affirmation "] || ""}`;

window.scrollTo(0,0);

}

/* DATE */
function formatDate(dateString){

let d=new Date(dateString);

if(isNaN(d)) return "";

return d.toLocaleDateString('en-GB',{
weekday:'long',
day:'numeric',
month:'long',
year:'numeric'
});

}

</script>

</body>
</html>
