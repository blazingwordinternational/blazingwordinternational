<!DOCTYPE html>
<html>
<head>
<title>Daily Blaze | Blazing Word International</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Georgia,serif;
background:#0b0b0b;
color:white;
line-height:1.8;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:#111;
padding:25px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.5);
}

h1{
text-align:center;
color:#ff4500;
margin-bottom:20px;
}

.content{
white-space:pre-line;
font-size:17px;
}

.archive{
margin-top:40px;
padding-top:20px;
border-top:1px solid #333;
}

.archive h2{
color:#ff4500;
margin-bottom:15px;
}

.archive a{
display:block;
color:#ffcc70;
margin-bottom:10px;
text-decoration:none;
}

.archive a:hover{
color:#ff4500;
}

</style>
</head>

<body>

<div class="container">

<h1>Today's Daily Blaze</h1>

<div id="daily-blaze" class="content">
Loading...
</div>

<div class="archive">
<h2>📚 Previous Devotionals</h2>
<div id="archive-list">Loading...</div>
</div>

</div>

<script>

const sheetURL = "https://script.google.com/macros/s/AKfycbxa9j4cvBPYw8baLe9c6vBrK4X0FkYmY-Y8Uf2QTHFZtqMOtHmG3Wa4PicOGN2mw7ne/exec";

fetch(sheetURL)
.then(res => res.json())
.then(data => {

let latest = data[data.length - 1];

function formatDate(dateString){
let d = new Date(dateString);
return d.toLocaleDateString('en-GB',{
weekday:'long',
day:'numeric',
month:'long',
year:'numeric'
});
}

function formatMessage(item){

return `
🔥 THE DAILY BLAZE 🔥
Apst. K. Atting

📅 ${formatDate(item.Timestamp)}

*TOPIC: ${item.Topic || ""}*

*📖 BIBLE READING:*

${item.Scripture || ""}

${item.Message || ""}

*PRAYER*

${item.Prayer || ""}

*🔥 DECLARATION/AFFIRMATION 🔥*

${item["Declaration/Affirmation"] || ""}

🔥Blazing Word International🔥
🔥 Raising lives through the power of God's word 🔥
`;

}

document.getElementById("daily-blaze").innerText =
formatMessage(latest);

let archiveHTML = "";

data.slice().reverse().forEach((item)=>{

archiveHTML += `
<a href="#"
onclick='showDevotional(${JSON.stringify(item)})'>
📖 ${item.Topic}
</a>
`;

});

document.getElementById("archive-list").innerHTML =
archiveHTML;

window.showDevotional = function(item){
document.getElementById("daily-blaze").innerText =
formatMessage(item);
window.scrollTo(0,0);
};

})

.catch(err=>{
document.getElementById("daily-blaze").innerHTML =
"Unable to load Daily Blaze.";
document.getElementById("archive-list").innerHTML =
"Archive unavailable.";
});

</script>

</body>
</html>
