<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Blaze</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
}

.header{
background:linear-gradient(90deg,#ff6a00,#ff2e00);
padding:15px;
text-align:center;
font-weight:bold;
}

.container{ padding:20px; }

.card{
background:#1a1a1a;
padding:18px;
border-radius:12px;
margin-top:15px;
}

.title{
color:#ff6a00;
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

.small{ font-size:14px; opacity:0.9; line-height:1.6; }
</style>
</head>

<body>

<div class="header">Today's Daily Blaze</div>

<div class="container">
<div id="content" class="card">Loading...</div>
</div>

<!-- ✅ TABLETOP JS (FIXES EVERYTHING) -->
<script src="https://cdn.jsdelivr.net/npm/tabletop@1.6.0/tabletop.min.js"></script>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQN4Ns8eFCua6ysaVsl_emP9bUo-wOAwo5scj1mhNJ8Yd6fI6zBabB1b1qOooKKHi6yklBZ8YHJRjnI/pubhtml";

Tabletop.init({
  key: sheetURL,
  simpleSheet: true,
  callback: function(data) {

    if (!data || data.length === 0) {
      document.getElementById("content").innerHTML =
      "No Daily Blaze posted yet.";
      return;
    }

    const latest = data[data.length - 1];

    document.getElementById("content").innerHTML = `
      <div class="title">${latest.Topic || ""}</div>

      <p><strong>Scripture:</strong> ${latest.Scripture || ""}</p>

      <p class="small">${latest.Timestamp || ""}</p>

      <br>

      <p class="small">${latest.Message || ""}</p>

      <br>

      <p><strong>Declaration:</strong></p>
      <p class="small">${latest.Declaration || ""}</p>
    `;

  },
  error: function() {
    document.getElementById("content").innerHTML =
    "Unable to load Daily Blaze at the moment.";
  }
});

</script>

</body>
</html>
