<!DOCTYPE html>
<html>
<head>
<title>Daily Blaze | Blazing Word International</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Georgia,serif;
background:#0b0b0b;
color:white;
line-height:1.8;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:#111;
padding:25px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,.5);
}

.content{
white-space:pre-line;
font-size:17px;
}

.archive{
margin-top:40px;
padding-top:20px;
border-top:1px solid #333;
}

.archive h2{
color:#ff4500;
margin-bottom:15px;
}

.archive a{
display:block;
color:#ffcc70;
margin-bottom:10px;
text-decoration:none;
font-weight:bold;
}

.archive a:hover{
color:#ff4500;
}
</style>
</head>

<body>

<div class="container">

<div id="daily-blaze" class="content">
Loading...
</div>

<div class="archive">
<h2>📚 Previous Devotionals</h2>
<div id="archive-list"></div>
</div>

</div>

<script>

const sheetURL =
"https://script.google.com/macros/s/AKfycbxA09f1vq26mnN-lvy8Bx4uahNTb14zpxjKAZT9H9IEgP3ecGVDSTsofA4JCZIxB1Wk/exec";

fetch(sheetURL)
.then(res => res.json())
.then(data => {

let latest = data[data.length - 1];

function formatDate(dateString){

if(!dateString || dateString==="") return "";

let d = new Date(dateString);

if(isNaN(d)) return "";

return d.toLocaleDateString('en-GB',{
weekday:'long',
day:'numeric',
month:'long',
year:'numeric'
});

}

function formatMessage(item){

return `

${item["Header"] || "🔥 THE DAILY BLAZE 🔥\nApst. K. Atting"}

${formatDate(item.Timestamp) ? "📅 " + formatDate(item.Timestamp) : ""}

${item["Topic:"] || ""}

${item["Scripture:"] || ""}

${item["Message:"] || ""}

${item["Prayer:"] || ""}

${item["Declaration/Affirmation "] || ""}

`;

}

document.getElementById("daily-blaze").innerText =
formatMessage(latest);

let archiveHTML = "";

data.slice().reverse().forEach((item)=>{

archiveHTML += `
<a href="#"
onclick='showDevotional(${JSON.stringify(item)})'>
📖 ${item["Topic:"] || "Daily Blaze"}
</a>
`;

});

document.getElementById("archive-list").innerHTML =
archiveHTML;

window.showDevotional = function(item){

document.getElementById("daily-blaze").innerText =
formatMessage(item);

window.scrollTo(0,0);

};

})

.catch(err=>{

document.getElementById("daily-blaze").innerHTML =
"Unable to load Daily Blaze.";

document.getElementById("archive-list").innerHTML =
"Archive unavailable.";

});

</script>

</body>
</html>
