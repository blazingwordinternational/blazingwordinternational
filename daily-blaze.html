<!DOCTYPE html>
<html>
<head>
<title>Daily Blaze | Blazing Word International</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#0b0b0b;
color:white;
line-height:1.8;
}

.header{
background:#111;
text-align:center;
padding:60px 20px;
}

.header h1{
color:#ff4500;
font-size:38px;
}

.header p{
color:#ffcc70;
}

nav{
background:#1a1a1a;
padding:15px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:0 10px;
font-weight:bold;
}

.section{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.card{
background:#151515;
padding:25px;
border-radius:10px;
margin-bottom:20px;
}

.card h2{
color:#ff4500;
margin-bottom:15px;
}

.btn{
display:inline-block;
background:#ff4500;
color:white;
padding:14px 22px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
margin-top:10px;
}

footer{
background:#111;
padding:25px;
text-align:center;
margin-top:40px;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;
font-size:22px;
}

#content h3{
color:#ffcc70;
font-size:28px;
margin-bottom:15px;
}

#content p{
margin-bottom:15px;
}

</style>
</head>

<body>

<div class="header">
<h1>🔥 Daily Blaze</h1>
<p>Blazing Word International</p>
</div>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="pastor.html">Pastor</a>
<a href="daily-blaze.html">Daily Blaze</a>
<a href="contact.html">Contact</a>
</nav>

<div class="section">

<div class="card">

<h2>🔥 Publish Daily Blaze</h2>

<p>Click below to submit today's devotional.</p>

<a class="btn"
href="https://docs.google.com/forms/d/e/1FAIpQLSeQBOHKYT_d4y695OGwOqaLiOyMjeROjgG8-xQlOlXkGi6g5A/viewform"
target="_blank">

📝 POST DAILY BLAZE

</a>

</div>

<div class="card">

<h2>Today's Daily Blaze</h2>

<div id="content">
Loading today's Daily Blaze...
</div>

</div>

</div>

<footer>
🔥 FIRE IS OUR LIFESTYLE 🔥
<br><br>
© 2026 Blazing Word International
</footer>

<a class="whatsapp"
href="https://wa.me/2349066079452">
💬
</a>

<script>

const apiURL =
"https://script.google.com/macros/s/AKfycbxA09f1vq26mnN-lvy8Bx4uahNTb14zpxjKAZT9H9IEgP3ecGVDSTsofA4JCZIxB1Wk/exec";

fetch(apiURL)
.then(res => res.json())
.then(data => {

if(!data || data.length === 0){

document.getElementById("content").innerHTML =
"No Daily Blaze posted yet.";

return;
}

const latest = data[data.length - 1];

document.getElementById("content").innerHTML = `

<h3>${latest["Topic:"] || ""}</h3>

<p><strong>Scripture:</strong><br>
${latest["Scripture:"] || ""}
</p>

<p>
${latest["Message:"] || ""}
</p>

<p><strong>Prayer:</strong><br>
${latest["Prayer:"] || ""}
</p>

<p><strong>Declaration/Affirmation:</strong><br>
${latest["Declaration/Affirmation "] || ""}
</p>

`;

})
.catch(err => {

document.getElementById("content").innerHTML =
"Unable to load Daily Blaze at the moment.";

});

</script>

</body>
  </html>
