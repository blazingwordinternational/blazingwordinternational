<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Blaze</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0b0b0b;
color:#fff;
}

.header{
background:linear-gradient(90deg,#ff6a00,#ff2e00);
padding:15px;
text-align:center;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:#1a1a1a;
padding:18px;
border-radius:12px;
margin-top:15px;
box-shadow:0 0 12px rgba(255,80,0,0.25);
}

.title{
color:#ff6a00;
font-size:20px;
margin-bottom:10px;
font-weight:bold;
}

.small{
font-size:14px;
opacity:0.9;
line-height:1.6;
}

.loading{
opacity:0.7;
}
</style>
</head>

<body>

<div class="header">
Today's Daily Blaze
</div>

<div class="container">

<div id="content" class="card loading">
Loading Daily Blaze...
</div>

</div>

<script>

// ✅ YOUR GOOGLE SHEET CSV LINK
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQN4Ns8eFCua6ysaVsl_emP9bUo-wOAwo5scj1mhNJ8Yd6fI6zBabB1b1qOooKKHi6yklBZ8YHJRjnI/pub?output=csv";

fetch(sheetURL)
.then(res => res.text())
.then(data => {

    const rows = data.trim().split("\n");

    // Remove header row (Timestamp, Topic, etc.)
    const dataRows = rows.slice(1);

    if (dataRows.length === 0) {
        document.getElementById("content").innerHTML =
        "<b>No Daily Blaze posted yet.</b>";
        return;
    }

    // Get latest row
    const latest = dataRows[dataRows.length - 1].split(",");

    const timestamp = latest[0];
    const topic = latest[1];
    const scripture = latest[2];
    const message = latest[3];
    const declaration = latest[4];

    document.getElementById("content").innerHTML = `
        <div class="title">${topic}</div>

        <p><strong>Scripture:</strong> ${scripture}</p>
        <p class="small"><em>${timestamp}</em></p>

        <br>

        <p class="small">${message}</p>

        <br>

        <p><strong>Declaration:</strong></p>
        <p class="small">${declaration}</p>
    `;

})
.catch(err => {
    console.log(err);
    document.getElementById("content").innerHTML =
    "<b>Unable to load Daily Blaze at the moment.</b>";
});

</script>

</body>
</html>
